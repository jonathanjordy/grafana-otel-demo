services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ioh-clickhouse-server
    ports:
      - "8123:8123" # HTTP client port
      - "9000:9000" # Native client port
      - "9009:9009" # Inter-server communication port
      - "8443:8443" # HTTPS client port
    restart: always
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse # Persistent data storage
      - clickhouse_logs:/var/log/clickhouse-server # Persistent log storage
      - ./ipv4_only.xml:/etc/clickhouse-server/config.d/ipv4_only.xml # Explicitly use IPv4
    environment:
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=Indosat1967!

volumes:
  clickhouse_data:
  clickhouse_logs:
