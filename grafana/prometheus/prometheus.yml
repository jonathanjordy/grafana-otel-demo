global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Enable remote write receiver (so Tempo can push RED metrics into Prometheus)
# This is what powers the "span metrics" feature — request rate, error rate, duration
# generated automatically from traces without any extra code in your services.
remote_write_receiver_enabled: true  # CLI flag, set via prometheus args in docker-compose

scrape_configs:
  # Scrape the OTel Collector's Prometheus exporter
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Scrape each service's own /metrics endpoint
  # (OTel Python SDK exposes this automatically when prometheus exporter is enabled)
  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8000"]
    metrics_path: "/metrics"

  - job_name: "inventory-service"
    static_configs:
      - targets: ["inventory-service:8001"]
    metrics_path: "/metrics"

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:8002"]
    metrics_path: "/metrics"

  # Scrape Tempo's own metrics (optional but useful)
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: "/metrics"